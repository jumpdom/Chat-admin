<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; overflow: hidden; } /* Dark slate background */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function AdminApp() {
            const [messages, setMessages] = useState([
                { sender: 'user', content: 'Hi, yeh GF ke phone se aaya message hai (Demo)' },
                { sender: 'admin', content: 'Hello! Yeh admin panel hai.' }
            ]);
            const [messageInput, setMessageInput] = useState('');
            
            // Call State
            const [callState, setCallState] = useState(null); // 'audio' or 'video'
            const localVideoRef = useRef(null);
            const localStream = useRef(null);

            const sendMessage = () => {
                if (!messageInput.trim()) return;
                setMessages([...messages, { sender: 'admin', content: messageInput }]);
                setMessageInput('');
            };

            const startCall = async (isVideoCall) => {
                try {
                    localStream.current = await navigator.mediaDevices.getUserMedia({
                        audio: true,
                        video: isVideoCall,
                    });
                    setCallState(isVideoCall ? 'video' : 'audio');
                    setTimeout(() => {
                        if (localVideoRef.current) localVideoRef.current.srcObject = localStream.current;
                    }, 100);
                } catch (error) {
                    alert('Camera/Mic access denied!');
                }
            };

            const endCall = () => {
                if (localStream.current) {
                    localStream.current.getTracks().forEach((track) => track.stop());
                    localStream.current = null;
                }
                setCallState(null);
            };

            if (callState) {
                return (
                    <div className="h-screen w-full bg-black relative flex flex-col">
                        <div className="absolute top-4 left-4 z-10 text-white font-bold bg-black/50 px-4 py-2 rounded-lg">
                            Admin Video Panel
                        </div>
                        <video ref={localVideoRef} autoPlay playsInline muted className="w-full h-full object-cover" />
                        <div className="absolute bottom-10 left-1/2 transform -translate-x-1/2 flex gap-4 bg-black/60 backdrop-blur-md px-6 py-4 rounded-full">
                            <button onClick={endCall} className="w-16 h-16 rounded-full bg-red-600 flex items-center justify-center hover:bg-red-700 transition">
                                <i className="fas fa-phone-slash text-2xl text-white"></i>
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full flex flex-col md:max-w-2xl md:mx-auto bg-slate-900 shadow-2xl">
                    {/* Header */}
                    <div className="bg-slate-800 p-4 flex items-center justify-between border-b border-slate-700">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full bg-pink-500 flex items-center justify-center text-white font-bold text-xl">
                                GF
                            </div>
                            <div>
                                <div className="text-white font-bold text-lg">Partner (Calculator App)</div>
                                <div className="text-sm text-yellow-400">Waiting for server connection...</div>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => startCall(false)} className="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center hover:bg-slate-600 transition">
                                <i className="fas fa-phone text-white text-lg"></i>
                            </button>
                            <button onClick={() => startCall(true)} className="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center hover:bg-slate-600 transition">
                                <i className="fas fa-video text-white text-lg"></i>
                            </button>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.map((msg, idx) => (
                            <div key={idx} className={`flex ${msg.sender === 'admin' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[75%] px-4 py-3 rounded-2xl shadow-md ${
                                    msg.sender === 'admin' 
                                    ? 'bg-blue-600 text-white rounded-tr-sm' 
                                    : 'bg-slate-700 text-white rounded-tl-sm'
                                }`}>
                                    {msg.content}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Message Input */}
                    <div className="p-4 bg-slate-800 border-t border-slate-700 pb-6">
                        <div className="flex gap-2">
                            <input 
                                type="text" 
                                value={messageInput} 
                                onChange={(e) => setMessageInput(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && sendMessage()}
                                placeholder="Type your message..." 
                                className="flex-1 bg-slate-900 text-white px-5 py-4 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 border border-slate-700" 
                            />
                            <button onClick={sendMessage} className="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center hover:bg-blue-700 transition shadow-lg">
                                <i className="fas fa-paper-plane text-white text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
