<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Chat Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-zinc-950 text-white h-screen w-screen overflow-hidden m-0 p-0">
    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const firebaseConfig = {
          apiKey: "AIzaSyBHnQxGTZXvSlJj77TWGFJLpPRQm6n_xOU",
          authDomain: "msg-jaan.firebaseapp.com",
          databaseURL: "https://msg-jaan-default-rtdb.firebaseio.com",
          projectId: "msg-jaan",
          storageBucket: "msg-jaan.firebasestorage.app",
          messagingSenderId: "188484227989",
          appId: "1:188484227989:web:9e4ddf981d8f71a3ea9c9c",
          measurementId: "G-PTDBD416S6"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const { useState, useEffect, useRef } = React;

        function AdminApp() {
            const [messages, setMessages] = useState([]);
            const [replyInput, setReplyInput] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => {
                const messagesRef = db.ref('messages');
                messagesRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const list = Object.keys(data).map(key => data[key]);
                        setMessages(list);
                    }
                });
                return () => messagesRef.off();
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const sendReply = () => {
                if (!replyInput.trim()) return;
                db.ref('messages').push({
                    sender: 'admin',
                    content: replyInput,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                setReplyInput('');
            };

            const handleActionAlert = (type) => {
                alert(`${type} feature is connecting from admin panel...`);
            };

            return (
                <div class="h-full w-full flex flex-col max-w-md mx-auto border-x border-neutral-800 bg-black">
                    {/* Header with Call Icons */}
                    <div class="bg-neutral-900 p-4 pt-6 border-b border-neutral-800 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center text-white font-bold">A</div>
                            <div>
                                <div class="text-white font-medium">Admin Monitor</div>
                                <div class="text-xs text-green-500">Connected</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-5 text-xl text-red-500 pr-2">
                            <button onClick={() => handleActionAlert('Audio Call')} className="p-1 hover:text-red-400"><i className="fas fa-phone"></i></button>
                            <button onClick={() => handleActionAlert('Video Call')} className="p-1 hover:text-red-400"><i className="fas fa-video"></i></button>
                        </div>
                    </div>

                    {/* Chat Area */}
                    <div class="flex-1 overflow-y-auto p-4 space-y-3">
                        {messages.map((msg, idx) => (
                            <div key={idx} class={`flex ${msg.sender === 'admin' ? 'justify-end' : 'justify-start'}`}>
                                <div class={`max-w-[75%] px-4 py-2 rounded-2xl ${msg.sender === 'admin' ? 'bg-red-600 text-white rounded-br-sm' : 'bg-neutral-800 text-white rounded-bl-sm'}`}>
                                    <div class="text-[10px] text-neutral-400 mb-0.5">{msg.sender === 'admin' ? 'You' : 'User'}</div>
                                    {msg.content}
                                </div>
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>

                    {/* Input Reply with Camera Icon */}
                    <div class="p-4 bg-neutral-900 border-t border-neutral-800 pb-6">
                        <div class="flex items-center gap-2">
                            <button onClick={() => handleActionAlert('Photo Upload')} className="w-10 h-10 rounded-full bg-neutral-800 flex items-center justify-center text-neutral-400 hover:text-white">
                                <i className="fas fa-camera text-lg"></i>
                            </button>
                            <input type="text" value={replyInput} onChange={(e) => setReplyInput(e.target.value)}
                                placeholder="Type a reply..." class="flex-1 bg-neutral-800 text-white px-4 py-2.5 rounded-full focus:outline-none" />
                            <button onClick={sendReply} class="w-11 h-11 rounded-full bg-red-600 flex items-center justify-center text-white">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminApp />);
    </script>
</body>
</html>
